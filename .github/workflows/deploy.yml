name: Deploy via Webhook

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -s -f -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{\"ref\":\"refs/heads/main\"}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | awk '{print $2}')" \
            -d '{\"ref\":\"refs/heads/main\",\"repository\":{\"full_name\":\"drmoraes/entreescolhas\"}}' \
            https://entreescolhas.com.br/deploy.php
