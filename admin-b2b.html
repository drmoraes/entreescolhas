<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin B2B — Banco de Talentos | Entre Escolhas</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="/favicon.svg" />
<style>
  :root{--bg:#08080F;--bg-card:#0F0F1E;--bg-raised:#141428;--border:rgba(108,99,255,.15);
    --border-hover:rgba(108,99,255,.4);--accent:#6C63FF;--accent-dim:rgba(108,99,255,.12);
    --text:#F0EFF8;--text-2:#9490C0;--text-3:#5E5A8A;--green:#22C55E;--gold:#C9A84C;--red:#EF4444}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:600}
  input,select{font-family:inherit;background:var(--bg-raised);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 13px;font-size:14px;width:100%}
  label.fl{display:block;font-size:12px;color:var(--text-2);margin-bottom:5px}
  .btn{background:var(--accent);color:#fff;padding:11px 18px;font-size:14px}
  header{display:flex;align-items:center;gap:14px;padding:14px 26px;border-bottom:1px solid var(--border);position:sticky;top:0;background:color-mix(in srgb, var(--bg) 90%, transparent);backdrop-filter:blur(10px);z-index:5}
  .brand{font-weight:800}.brand span{color:var(--accent)}
  main{max-width:1180px;margin:0 auto;padding:26px}
  .muted{color:var(--text-2)}.small{font-size:12px}.hide{display:none!important}
  h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin:26px 0 12px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
  .kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px}
  .kpi .v{font-size:30px;font-weight:800}.kpi .l{color:var(--text-2);font-size:12px;margin-top:2px}
  .kpi .s{font-size:12px;margin-top:6px}
  .accent{color:var(--accent)}.green{color:var(--green)}.gold{color:var(--gold)}.red{color:var(--red)}
  table{width:100%;border-collapse:collapse;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;font-size:13px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
  th{color:var(--text-3);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
  tr:last-child td{border:none}
  .funnel-row{display:flex;align-items:center;gap:10px;margin:6px 0}
  .funnel-row .fl{width:170px;font-size:13px;color:var(--text-2)}
  .fbar{height:26px;border-radius:6px;background:var(--accent-dim);display:flex;align-items:center;padding:0 10px;color:#fff;font-weight:700;font-size:12px;min-width:42px}
  .gate{max-width:380px;margin:80px auto;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:30px}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid var(--accent-dim);border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.2s;z-index:40}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(600px,96vw);background:var(--bg-card);border-left:1px solid var(--border);transform:translateX(100%);transition:.22s;z-index:41;overflow-y:auto;padding:24px}
  .drawer.on{transform:none}
  .drawer .x{position:absolute;top:16px;right:18px;font-size:20px;color:var(--text-2);background:none;border:none;cursor:pointer}
  .albox{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-radius:11px;border:1px solid var(--border);margin-bottom:8px}
</style>
  <link rel="stylesheet" href="/theme.css?v=3">
  <script src="/theme.js?v=3"></script>
  <script src="/cookies.js?v=1" defer></script>
</head>
<body>
<header><div class="brand">Entre<span>Escolhas</span> · Admin B2B</div>
  <div style="flex:1"></div>
  <a class="btn" href="/admin-candidatos.html" style="text-decoration:none;background:transparent;border:1px solid var(--border);color:var(--text-2);margin-right:6px">Candidatos</a>
  <a class="btn" href="/admin-cupons.html" style="text-decoration:none;background:transparent;border:1px solid var(--border);color:var(--text-2);margin-right:6px">Cupons</a>
  <a class="btn" href="/admin-usuarios.html" style="text-decoration:none;background:transparent;border:1px solid var(--border);color:var(--text-2);margin-right:6px">Usuários</a>
  <a class="btn" href="/admin-testes.html" style="text-decoration:none;background:transparent;border:1px solid var(--border);color:var(--text-2);margin-right:6px">Testes</a>
  <button class="btn" id="refreshBtn" onclick="load()" style="display:none">Atualizar</button>
</header>

<div id="gate" class="gate">
  <h2 style="font-size:17px;margin-bottom:4px">Painel administrativo</h2>
  <p class="muted small" style="margin-bottom:16px">Informe a ADMIN_API_KEY para acessar.</p>
  <input id="key" type="password" placeholder="ADMIN_API_KEY" />
  <button class="btn" style="width:100%;margin-top:12px" onclick="load()">Entrar</button>
  <div id="gErr" class="red small" style="margin-top:10px"></div>
</div>

<main id="dash" class="hide"></main>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"><button class="x" onclick="closeDrawer()">✕</button><div id="drawerBody"></div></div>

<script>
const $=id=>document.getElementById(id);let KEY='';
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function pct(n){return (n==null?0:n)+'%';}

async function load(){
  KEY=KEY||$('key').value.trim();
  if(!KEY){$('gErr').textContent='Informe a chave';return;}
  $('gErr').textContent='';
  try{
    const r=await fetch('/api/b2b?fn=admin_stats',{headers:{'X-Api-Key':KEY}});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'Acesso negado');}
    const d=await r.json();
    $('gate').classList.add('hide');$('dash').classList.remove('hide');$('refreshBtn').style.display='';
    render(d);
    carregarPreco();
  }catch(e){$('gErr').textContent=e.message;}
}

async function carregarPreco(){
  try{ const d=await fetch('/api/b2b?fn=admin_settings&op=get',{headers:{'X-Api-Key':KEY}}).then(r=>r.json());
    if($('cfgPrice')) $('cfgPrice').value=Number(d.report_price).toFixed(2);
    if($('cfgFree')) $('cfgFree').checked=!!d.free_mode;
    if($('cfgCortesia')) $('cfgCortesia').value=d.cortesia_codes||'';
    if($('cfgCounter')) $('cfgCounter').value=d.counter_base||0;
    if($('cfgCortAdv')){
      let arr=[]; try{arr=JSON.parse(d.cortesia_config||'[]')||[];}catch(e){}
      $('cfgCortAdv').value=arr.map(c=>[c.code,(c.expires||''),(c.max_uses||0)].join(' | ')).join('\n');
      renderCortUsos(arr);
    }
    const cc=d.credit_cost||{};
    ['operacional','analista','especialista','gerencial','pcd'].forEach(k=>{ if($('cc_'+k)&&cc[k]!=null) $('cc_'+k).value=cc[k]; });
  }catch(e){}
}
function renderCortUsos(arr){
  const box=$('cortUsos'); if(!box)return;
  if(!arr.length){box.innerHTML='';return;}
  box.innerHTML='<div class="muted small" style="margin-top:8px">Usos por código:</div>'+arr.map(c=>{
    const lim=c.max_uses?('/'+c.max_uses):' (ilimitado)';
    const exp=c.expires?(' · expira '+c.expires):'';
    return `<div class="small" style="padding:2px 0"><b>${c.code}</b> — ${c.uses||0}${lim} usos${exp}</div>`;
  }).join('');
}
async function salvarCortAdv(){
  const msg=$('cortAdvMsg'); msg.textContent='Salvando…';msg.className='small muted';
  const linhas=($('cfgCortAdv').value||'').split('\n').map(l=>l.trim()).filter(Boolean);
  const cortesia_config=linhas.map(l=>{
    const p=l.split('|').map(s=>s.trim());
    return { code:(p[0]||'').toUpperCase(), expires:(p[1]||''), max_uses:parseInt(p[2],10)||0 };
  }).filter(c=>c.code);
  try{
    const r=await fetch('/api/b2b?fn=admin_settings&op=set',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Key':KEY},body:JSON.stringify({cortesia_config})});
    const d=await r.json(); if(!r.ok)throw new Error(d.error||'Falha');
    let arr=[];try{arr=JSON.parse(d.cortesia_config||'[]')||[];}catch(e){}
    $('cfgCortAdv').value=arr.map(c=>[c.code,(c.expires||''),(c.max_uses||0)].join(' | ')).join('\n');
    renderCortUsos(arr);
    msg.textContent='✓ Links de cortesia salvos';msg.className='small green';
  }catch(e){msg.textContent=e.message;msg.className='small red';}
}
async function salvarCounter(){
  const msg=$('counterMsg'); msg.textContent='Salvando…';msg.className='small muted';
  try{
    const r=await fetch('/api/b2b?fn=admin_settings&op=set',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Key':KEY},body:JSON.stringify({counter_base:parseInt($('cfgCounter').value,10)||0})});
    const d=await r.json(); if(!r.ok)throw new Error(d.error||'Falha');
    $('cfgCounter').value=d.counter_base||0;
    msg.textContent='✓ Contador salvo ('+(d.counter_base||0).toLocaleString('pt-BR')+' + reais)';msg.className='small green';
  }catch(e){msg.textContent=e.message;msg.className='small red';}
}
async function salvarCustos(){
  const msg=$('ccMsg'); msg.textContent='Salvando…';msg.className='small muted';
  const credit_cost={};
  ['operacional','analista','especialista','gerencial','pcd'].forEach(k=>{ const el=$('cc_'+k); if(el&&el.value!=='') credit_cost[k]=parseInt(el.value,10); });
  try{
    const r=await fetch('/api/b2b?fn=admin_settings&op=set',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Key':KEY},body:JSON.stringify({credit_cost})});
    const d=await r.json(); if(!r.ok)throw new Error(d.error||'Falha');
    msg.textContent='✓ Custos salvos';msg.className='small green';
  }catch(e){msg.textContent=e.message;msg.className='small red';}
}
async function migrarRH(){
  const msg=$('ccMsg'); if(!confirm('Cria as colunas de categoria/setores e os parâmetros de custo. Idempotente. Continuar?'))return;
  msg.textContent='Migrando…';msg.className='small muted';
  try{
    const r=await fetch('/api/b2b?fn=admin_migrate_rh',{headers:{'X-Api-Key':KEY}});
    const d=await r.json(); if(!r.ok)throw new Error(d.error||'Falha');
    msg.textContent='✓ Migração RH OK ('+d.applied+' comandos)';msg.className='small green';carregarPreco();
  }catch(e){msg.textContent=e.message;msg.className='small red';}
}
async function salvarFree(){
  const msg=$('cfgMsg'); msg.textContent='Salvando…';msg.className='small muted';
  try{
    const r=await fetch('/api/b2b?fn=admin_settings&op=set',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Key':KEY},body:JSON.stringify({free_mode:$('cfgFree').checked})});
    const d=await r.json(); if(!r.ok)throw new Error(d.error||'Falha');
    msg.textContent=d.free_mode?'✓ Modo grátis LIGADO':'✓ Modo grátis desligado (cobrando)';msg.className='small green';
  }catch(e){msg.textContent=e.message;msg.className='small red';}
}
async function salvarCortesia(){
  const msg=$('cortMsg'); msg.textContent='Salvando…';msg.className='small muted';
  try{
    const r=await fetch('/api/b2b?fn=admin_settings&op=set',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Key':KEY},body:JSON.stringify({cortesia_codes:$('cfgCortesia').value})});
    const d=await r.json(); if(!r.ok)throw new Error(d.error||'Falha');
    $('cfgCortesia').value=d.cortesia_codes||'';
    msg.textContent='✓ Códigos salvos';msg.className='small green';
  }catch(e){msg.textContent=e.message;msg.className='small red';}
}
async function salvarPreco(){
  const v=parseFloat($('cfgPrice').value), msg=$('cfgMsg');
  if(!(v>0)){msg.textContent='Valor inválido';msg.className='small red';return;}
  msg.textContent='Salvando…';msg.className='small muted';
  try{
    const r=await fetch('/api/b2b?fn=admin_settings&op=set',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Key':KEY},body:JSON.stringify({report_price:v})});
    const d=await r.json(); if(!r.ok)throw new Error(d.error||'Falha');
    msg.textContent='✓ Preço salvo: R$ '+Number(d.report_price).toFixed(2);msg.className='small green';
  }catch(e){msg.textContent=e.message;msg.className='small red';}
}

function kpi(v,l,s,cls){return `<div class="kpi"><div class="v ${cls||''}">${v}</div><div class="l">${l}</div>${s?'<div class="s muted">'+s+'</div>':''}</div>`;}

async function grantCredits(){
  const id=$('grCompany').value, amount=parseInt($('grAmount').value,10), reason=$('grReason').value.trim();
  const msg=$('grMsg');
  if(!id){msg.textContent='Selecione uma empresa';msg.className='small red';return;}
  if(!amount){msg.textContent='Informe uma quantidade (≠ 0)';msg.className='small red';return;}
  msg.textContent='Processando…';msg.className='small muted';
  try{
    const r=await fetch('/api/b2b?fn=admin_grant_credits',{method:'POST',
      headers:{'Content-Type':'application/json','X-Api-Key':KEY},
      body:JSON.stringify({company_id:id,amount,reason})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Falha');
    msg.textContent=`✓ ${d.empresa}: ${d.delta>0?'+':''}${d.delta} créditos → saldo ${d.saldo}`;msg.className='small green';
    setTimeout(load,900); // recarrega KPIs e saldos
  }catch(e){msg.textContent=e.message;msg.className='small red';}
}

function brl(n){return 'R$ '+Number(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function brlShort(n){n=Number(n||0);return n>=1000?'R$ '+(n/1000).toFixed(1)+'k':'R$ '+n.toFixed(0);}

function render(d){
  const f=d.funil,cr=d.credits,b=d.base,r=d.responsividade,pv=d.privacidade;
  const rec=d.receita||{},alertas=d.alertas||[];
  const funnelData=[['Buscas (30d)',f.buscas_30d],['Desbloqueios',f.total],['Responderam',f.respondidos],['Estornados',f.estornados]];
  const max=Math.max(...funnelData.map(x=>x[1]),1);
  const funnel=funnelData.map(([l,v])=>`<div class="funnel-row"><span class="fl">${l}</span>
    <span class="fbar" style="width:${Math.max(8,Math.round(v/max*100))}%">${v}</span></div>`).join('');

  // Alertas
  const sevc={alto:'red',medio:'gold',baixo:'accent'};
  const alertasHtml = alertas.length
    ? alertas.map(a=>`<div class="kpi" style="padding:12px 14px;display:flex;gap:10px;align-items:flex-start;border-color:${a.sev==='alto'?'rgba(239,68,68,.3)':'rgba(201,168,76,.3)'}">
        <span class="${sevc[a.sev]}" style="font-weight:800">●</span>
        <div><b>${esc(a.tipo)} — ${esc(a.empresa)}</b><div class="muted small">${esc(a.detalhe)}</div></div></div>`).join('')
    : '<div class="kpi muted" style="padding:14px">Nenhum alerta no momento ✓</div>';

  // Série mensal (barras)
  const serie=rec.serie||[];
  const smax=Math.max(...serie.map(x=>x.receita),1);
  const serieBars=serie.length?serie.map(s=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="font-size:10px;color:var(--text-2)">${brlShort(s.receita)}</div>
      <div style="width:100%;background:linear-gradient(180deg,#6C63FF,rgba(108,99,255,.2));border-radius:5px 5px 0 0;height:${Math.max(4,Math.round(s.receita/smax*120))}px"></div>
      <div style="font-size:10px;color:var(--text-3)">${s.mes.slice(5)}</div></div>`).join(''):'<span class="muted small">Sem vendas pagas ainda.</span>';

  $('dash').innerHTML=`
  <h2 class="sec">Relatório do candidato (B2C)</h2>
  <div class="kpi" style="padding:14px;max-width:560px">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span class="muted small">Preço R$</span>
      <input id="cfgPrice" type="number" step="0.01" min="0.5" style="width:120px" placeholder="7.97">
      <button class="btn" onclick="salvarPreco()">Salvar</button>
      <span id="cfgMsg" class="small"></span>
    </div>
    <label class="small" style="display:flex;align-items:center;gap:8px;margin-top:12px;cursor:pointer">
      <input type="checkbox" id="cfgFree" onchange="salvarFree()" style="width:auto">
      <span><b>Modo grátis</b> — libera o relatório sem pagamento (foco em volume / Banco de Talentos)</span>
    </label>
    <p class="muted small" style="margin-top:8px">Com o modo grátis ligado, o paywall vira "Ver meu relatório grátis" e não cobra. Desligado = cobra o preço acima.</p>
  </div>

  <h2 class="sec">Contador público (prova social)</h2>
  <div class="kpi" style="padding:14px;max-width:560px">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span class="muted small">Base do contador</span>
      <input id="cfgCounter" type="number" min="0" step="1" style="width:140px" placeholder="100000">
      <button class="btn" onclick="salvarCounter()">Salvar</button>
      <span id="counterMsg" class="small"></span>
    </div>
    <p class="muted small" style="margin-top:8px">Somado à contagem real de testes concluídos no contador da home ("já se descobriram"). Ex.: base <code>100000</code> mostra ~100 mil desde o início. Use com parcimônia — número muito acima do real pode soar pouco cr&iacute;vel para quem chega.</p>
  </div>

  <h2 class="sec">Links de cortesia (grátis com validade e limite)</h2>
  <div class="kpi" style="padding:14px;max-width:680px">
    <label class="muted small">Um código por linha: <code>CÓDIGO | validade(AAAA-MM-DD) | limite de usos</code></label>
    <textarea id="cfgCortAdv" rows="4" style="width:100%;margin-top:4px;font-family:monospace;font-size:13px" placeholder="SEGUIDORES | 2026-07-31 | 500&#10;IMPRENSA | | 0"></textarea>
    <div style="display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap">
      <button class="btn" onclick="salvarCortAdv()">Salvar links</button>
      <span id="cortAdvMsg" class="small"></span>
    </div>
    <div id="cortUsos"></div>
    <p class="muted small" style="margin-top:10px">Validade e limite s&atilde;o opcionais: deixe em branco / <code>0</code> para sem expira&ccedil;&atilde;o ou sem limite. Link: <code>entreescolhas.com.br/teste.html?jornada=arquetipo&amp;cortesia=CÓDIGO</code>. Quem abrir faz cadastro + teste e libera o relat&oacute;rio de gra&ccedil;a. Para revogar, apague a linha.</p>
    <p class="muted small" style="margin-top:6px">Jornadas: <code>arquetipo</code>, <code>fit-cultural</code>, <code>scanner</code>, <code>bussola</code>.</p>
    <details style="margin-top:8px"><summary class="muted small" style="cursor:pointer">C&oacute;digos simples (legado, sem limite)</summary>
      <input id="cfgCortesia" type="text" style="width:100%;margin-top:6px" placeholder="IMPRENSA2026, PARCEIRO">
      <div style="display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap">
        <button class="btn" onclick="salvarCortesia()">Salvar (legado)</button><span id="cortMsg" class="small"></span>
      </div>
    </details>
  </div>

  <h2 class="sec">Custo de crédito por categoria (B2B)</h2>
  <div class="kpi" style="padding:14px;max-width:680px">
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
      <div><label class="muted small">Operacional</label><input id="cc_operacional" type="number" min="0" step="1" placeholder="1"></div>
      <div><label class="muted small">Analista</label><input id="cc_analista" type="number" min="0" step="1" placeholder="4"></div>
      <div><label class="muted small">Especialista</label><input id="cc_especialista" type="number" min="0" step="1" placeholder="4"></div>
      <div><label class="muted small">Gerencial</label><input id="cc_gerencial" type="number" min="0" step="1" placeholder="6"></div>
      <div><label class="muted small">PCD</label><input id="cc_pcd" type="number" min="0" step="1" placeholder="8"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap">
      <button class="btn" onclick="salvarCustos()">Salvar custos</button>
      <button class="btn-ghost" onclick="migrarRH()">Instalar/migrar RH (1ª vez)</button>
      <span id="ccMsg" class="small"></span>
    </div>
    <p class="muted small" style="margin-top:8px">Quantos créditos a empresa gasta ao desbloquear cada perfil. PCD tem precedência sobre a categoria. A categoria vem do CSV/cadastro ou é deduzida do cargo/senioridade.</p>
  </div>

  ${alertas.length?`<h2 class="sec">Alertas (${alertas.length})</h2><div class="kpis">${alertasHtml}</div>`:''}

  <h2 class="sec">Receita (R$)</h2>
  <div class="kpis">
    ${kpi(brl(rec.gmv),'Receita paga (GMV)','total recebido','green')}
    ${kpi(brl(rec.pendente),'Pendente','aguardando pagamento','gold')}
    ${kpi(brl(rec.ticket_medio),'Ticket médio',rec.pedidos_pagos+' pedidos pagos')}
    ${kpi(brl(rec.arpa),'Receita por empresa','GMV ÷ ativas')}
    ${kpi(rec.creditos_vendidos,'Créditos vendidos',brl(rec.receita_por_credito)+'/crédito','accent')}
  </div>
  <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-top:12px">
    <div class="kpi" style="padding:16px">
      <div class="muted small" style="margin-bottom:8px">Receita por mês (pagos)</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:150px">${serieBars}</div>
    </div>
    <div class="kpi" style="padding:0;overflow:hidden">
      <table><thead><tr><th>Pacote</th><th>Vendidos</th><th>Receita</th></tr></thead><tbody>
        ${(rec.mix||[]).map(m=>`<tr><td>${esc(m.package)}</td><td>${m.vendidos}</td><td class="green">${brl(m.receita)}</td></tr>`).join('')||'<tr><td colspan="3" class="muted">Sem dados</td></tr>'}
      </tbody></table>
    </div>
  </div>
  <h2 class="sec">Pedidos recentes</h2>
  <table><thead><tr><th>Data</th><th>Empresa</th><th>Pacote</th><th>Valor</th><th>Status</th></tr></thead><tbody>
    ${(rec.pedidos||[]).map(p=>`<tr><td>${new Date(p.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
      <td>${esc(p.empresa||'—')}</td><td>${esc(p.package)}</td><td>${brl(p.price)}</td>
      <td><span class="${p.status==='paid'?'green':p.status==='pending'?'gold':'red'}">${p.status}</span></td></tr>`).join('')||'<tr><td colspan="5" class="muted">Sem pedidos</td></tr>'}
  </tbody></table>

  <h2 class="sec">Visão geral</h2>
  <div class="kpis">
    ${kpi(d.companies.ativas,'Empresas ativas',d.companies.total+' no total','accent')}
    ${kpi(pct(f.conversao_pct),'Conversão busca→desbloqueio','últimos 30 dias')}
    ${kpi(pct(r.taxa_resposta_pct),'Taxa de resposta',r.responderam+'/'+r.convidados+' convites','green')}
    ${kpi(pct(f.taxa_estorno_pct),'Taxa de estorno',f.estornados+' desbloqueios','gold')}
    ${kpi(r.horas_medias||'—','Horas até responder','tempo médio')}
  </div>

  <h2 class="sec">Funil de valor (30 dias)</h2>
  <div class="kpi" style="padding:18px">${funnel}</div>

  <h2 class="sec">Créditos</h2>
  <div class="kpis">
    ${kpi(cr.emitidos,'Emitidos','compras + bônus','accent')}
    ${kpi(cr.consumidos,'Consumidos','desbloqueios')}
    ${kpi(cr.reembolsados,'Reembolsados','antifrustração','gold')}
    ${kpi(cr.expirados,'Expirados','')}
  </div>

  <h2 class="sec">Conceder créditos a uma empresa</h2>
  <div class="kpi" style="padding:18px;max-width:680px">
    <div style="display:grid;grid-template-columns:1fr 130px;gap:12px">
      <div><label class="fl">Empresa</label>
        <select id="grCompany">
          ${(d.empresas||[]).map(e=>`<option value="${e.id}">${esc(e.nome)} — ${esc(e.email)} · saldo ${e.saldo}</option>`).join('')||'<option value="">(sem empresas)</option>'}
        </select>
      </div>
      <div><label class="fl">Quantidade</label><input id="grAmount" type="number" value="10" step="1" /></div>
    </div>
    <div style="margin-top:12px"><label class="fl">Motivo (opcional)</label><input id="grReason" placeholder="ex.: cortesia, ajuste comercial, parceria" /></div>
    <div style="display:flex;align-items:center;gap:12px;margin-top:14px">
      <button class="btn" onclick="grantCredits()">Conceder créditos</button>
      <span id="grMsg" class="small"></span>
    </div>
    <p class="muted small" style="margin-top:10px">Use número negativo para debitar. Cada lançamento fica na razão de créditos (auditável).</p>
  </div>

  <h2 class="sec">Empresas — clique para o painel 360</h2>
  <table><thead><tr><th>Empresa</th><th>Plano</th><th>Status</th><th>Saldo</th></tr></thead><tbody>
    ${(d.empresas||[]).map(e=>`<tr style="cursor:pointer" onclick="empresa360(${e.id})">
      <td><b>${esc(e.nome)}</b><div class="muted small">${esc(e.email)}</div></td>
      <td>${esc(e.plan)}</td><td>${esc(e.status)}</td>
      <td class="${e.saldo<5?'red':''}">${e.saldo}</td></tr>`).join('')||'<tr><td colspan="4" class="muted">Sem empresas</td></tr>'}
  </tbody></table>

  <h2 class="sec">Qualidade da base</h2>
  <div class="kpis">
    ${kpi(b.total,'Candidatos','não arquivados')}
    ${kpi(b.consentidos,'Consentidos B2B','')}
    ${kpi(b.ativos,'Ativos','confirmados ≤45d','green')}
    ${kpi(b.fantasmas,'Fantasmas','>90d ou nunca','red')}
    ${kpi(b.email_ok,'E-mail verificado','')}
    ${kpi(b.phone_ok,'Telefone verificado','')}
  </div>

  <h2 class="sec">Privacidade & risco</h2>
  <div class="kpis">
    ${kpi(pv.celulas_risco,'Células k<5','risco de reidentificação',pv.celulas_risco>0?'red':'green')}
    ${kpi(pv.celulas_total,'Células totais','área+senioridade+cidade')}
    ${kpi(pv.revogacoes,'Revogações de consentimento','')}
  </div>

  <h2 class="sec">Receita por cliente (top 10)</h2>
  <table><thead><tr><th>Empresa</th><th>Plano</th><th>Créditos comprados</th><th>Desbloqueios</th></tr></thead><tbody>
    ${d.top_clientes.map(c=>`<tr><td>${esc(c.nome)}</td><td>${esc(c.plan)}</td><td>${c.comprados}</td><td>${c.desbloqueios}</td></tr>`).join('')||'<tr><td colspan="4" class="muted">Sem dados</td></tr>'}
  </tbody></table>

  <h2 class="sec">Auditoria — acessos a PII (recentes)</h2>
  <table><thead><tr><th>Data</th><th>Ação</th><th>Empresa</th><th>Candidato</th><th>Detalhe</th></tr></thead><tbody>
    ${d.logs.map(l=>`<tr><td>${new Date(l.created_at).toLocaleString('pt-BR')}</td>
      <td>${esc(l.action)}</td><td>${esc(l.empresa||('#'+(l.company_id||'-')))}</td>
      <td>${l.candidate_id?('#'+l.candidate_id):'—'}</td><td class="muted">${esc(l.purpose||'')}</td></tr>`).join('')||'<tr><td colspan="5" class="muted">Sem logs</td></tr>'}
  </tbody></table>
  <p class="muted small" style="margin:14px 0 40px">access_logs é append-only (imutável) — UPDATE/DELETE bloqueados por trigger no banco.</p>`;
}

/* ---------- Empresa 360 (drawer) ---------- */
function openDrawer(){$('scrim').classList.add('on');$('drawer').classList.add('on');}
function closeDrawer(){$('scrim').classList.remove('on');$('drawer').classList.remove('on');}
function fmtDt(s){return s?new Date(s).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';}

async function empresa360(id){
  openDrawer();
  $('drawerBody').innerHTML='<div style="margin-top:30px" class="muted"><span class="spin"></span> Carregando…</div>';
  try{
    const r=await fetch('/api/b2b?fn=admin_company&id='+id,{headers:{'X-Api-Key':KEY}});
    const d=await r.json(); if(!r.ok)throw new Error(d.error||'Falha');
    renderEmpresa(d);
  }catch(e){$('drawerBody').innerHTML='<p class="red" style="margin-top:30px">'+esc(e.message)+'</p>';}
}

function renderEmpresa(d){
  const c=d.company,w=d.wallet,u=d.uso,rc=d.receita;
  const sevc={alto:'red',medio:'gold',baixo:'accent'};
  const al=(d.alertas||[]).map(a=>`<div class="albox" style="border-color:${a.sev==='alto'?'rgba(239,68,68,.3)':'rgba(201,168,76,.3)'}"><span class="${sevc[a.sev]}" style="font-weight:800">●</span><div><b>${esc(a.tipo)}</b><div class="muted small">${esc(a.detalhe)}</div></div></div>`).join('')
    || '<div class="albox"><span class="green">●</span><div class="muted small">Conta saudável, sem alertas.</div></div>';
  const compras=(d.compras||[]).map(x=>`<tr><td>${fmtDt(x.created_at)}</td><td>${esc(x.package)}</td><td>${brl(x.price)}</td><td><span class="${x.status==='paid'?'green':x.status==='pending'?'gold':'red'}">${x.status}</span></td></tr>`).join('')||'<tr><td colspan="4" class="muted">Sem compras</td></tr>';
  const ledger=(d.ledger||[]).map(x=>`<tr><td>${fmtDt(x.created_at)}</td><td>${esc(x.reason)}</td><td class="${x.delta>0?'green':'red'}">${x.delta>0?'+':''}${x.delta}</td><td class="muted">${x.balance_after??'—'}</td></tr>`).join('')||'<tr><td colspan="4" class="muted">Sem lançamentos</td></tr>';

  $('drawerBody').innerHTML=`
    <div style="margin-bottom:6px"><b style="font-size:17px">${esc(c.nome)}</b> <span class="muted small">· ${esc(c.plan)} · ${esc(c.status)}</span></div>
    <div class="muted small" style="margin-bottom:14px">${esc(c.email)} · empresa #${c.id}</div>
    ${al}
    <div class="kpis" style="grid-template-columns:1fr 1fr;gap:10px;margin-top:6px">
      ${kpi(w.saldo,'Saldo de créditos','',w.saldo<5?'red':'accent')}
      ${kpi(brl(rc.pago),'Receita paga','','green')}
      ${kpi(w.comprados+' / '+w.gastos,'Comprados / gastos','')}
      ${kpi(u.taxa_resposta+'%','Taxa de resposta',u.responderam+'/'+u.unlocks+' desbloqueios')}
    </div>

    <h2 class="sec">Conceder créditos / cortesia</h2>
    <div class="kpi" style="padding:14px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <input id="dvAmt" type="number" value="5" style="width:90px">
        <input id="dvReason" placeholder="motivo (ex.: cortesia, ativação)" style="flex:1;min-width:150px">
        <button class="btn" onclick="grantInDrawer(${c.id})">Conceder</button>
      </div>
      <span id="dvMsg" class="small"></span>
      <p class="muted small" style="margin-top:8px">Negativo debita. Fica auditável na razão de créditos.</p>
    </div>

    <h2 class="sec">Histórico de compras (R$)</h2>
    <table><thead><tr><th>Data</th><th>Pacote</th><th>Valor</th><th>Status</th></tr></thead><tbody>${compras}</tbody></table>
    <h2 class="sec">Razão de créditos (recente)</h2>
    <table><thead><tr><th>Data</th><th>Motivo</th><th>Δ</th><th>Saldo</th></tr></thead><tbody>${ledger}</tbody></table>

    <h2 class="sec">Usuários da empresa (RH)</h2>
    <div class="kpi" style="padding:14px;margin-bottom:8px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <input id="cuNome" placeholder="Nome">
        <input id="cuEmail" placeholder="E-mail">
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap">
        <select id="cuRole" style="flex:1;min-width:150px">
          <option value="gestor">Gestor de RH</option>
          <option value="analista" selected>Analista / Recrutador</option>
          <option value="owner">Owner (admin da empresa)</option>
          <option value="leitura">Leitura</option>
        </select>
        <button class="btn" onclick="cuCreate(${c.id})">Criar usuário</button>
      </div>
      <span id="cuMsg" class="small"></span>
    </div>
    <div id="cuBox" class="muted small"><span class="spin"></span> Carregando usuários…</div>
    <div style="height:30px"></div>`;
  loadCompanyUsers(c.id);
}

let CU_COMPANY=null;
const CU_ROLES=[['owner','Owner'],['gestor','Gestor RH'],['analista','Analista'],['recruiter','Recrutador'],['leitura','Leitura']];
async function loadCompanyUsers(companyId){
  CU_COMPANY=companyId;
  try{
    const r=await fetch('/api/b2b?fn=admin_company_users&op=list&company_id='+companyId,{headers:{'X-Api-Key':KEY}});
    const d=await r.json(); if(!r.ok)throw new Error(d.error||'Falha');
    const box=$('cuBox'); if(!box)return;
    box.classList.remove('muted','small');
    box.innerHTML=`<table><thead><tr><th>Nome</th><th>Papel</th><th>Status</th><th>Ações</th></tr></thead><tbody>
      ${(d.data||[]).map(x=>`<tr>
        <td><b>${esc(x.nome)}</b><div class="muted small">${esc(x.email)}</div></td>
        <td><select onchange="cuUpdate(${x.id},this.value)" style="padding:5px 8px">${CU_ROLES.map(r=>`<option value="${r[0]}" ${x.role===r[0]?'selected':''}>${r[1]}</option>`).join('')}</select></td>
        <td>${x.status==='ativo'?'<span style="color:var(--green)">ativo</span>':'<span class="red">inativo</span>'}</td>
        <td class="split" style="display:flex;gap:5px">
          <button class="btn" style="padding:5px 9px;background:var(--accent-dim);color:#cfcaff" onclick="cuReset(${x.id},'${esc(x.nome)}')">Resetar senha</button>
          <button class="btn" style="padding:5px 9px;background:transparent;border:1px solid var(--border);color:var(--text-2)" onclick="cuToggle(${x.id})">${x.status==='ativo'?'Desativar':'Ativar'}</button>
        </td></tr>`).join('')||'<tr><td colspan="4" class="muted">Sem usuários cadastrados</td></tr>'}
    </tbody></table>`;
  }catch(e){const box=$('cuBox');if(box)box.innerHTML='<span class="red small">'+esc(e.message)+'</span>';}
}
function cuApi(op,body){return fetch('/api/b2b?fn=admin_company_users&op='+op,{method:'POST',headers:{'Content-Type':'application/json','X-Api-Key':KEY},body:JSON.stringify(body)}).then(async r=>{const d=await r.json();if(!r.ok)throw new Error(d.error||'Falha');return d;});}
async function cuCreate(companyId){
  const nome=$('cuNome').value.trim(),email=$('cuEmail').value.trim(),role=$('cuRole').value,msg=$('cuMsg');
  if(!nome||!email){msg.textContent='Preencha nome e e-mail';msg.className='small red';return;}
  msg.textContent='Criando…';msg.className='small muted';
  try{ const d=await cuApi('create',{company_id:companyId,nome,email,role});
    $('cuNome').value='';$('cuEmail').value='';msg.textContent='';
    prompt(`Usuário criado! Senha temporária de ${nome} (entregue com segurança — ele troca depois no Portal RH):`,d.temp_password);
    loadCompanyUsers(companyId);
  }catch(e){msg.textContent=e.message;msg.className='small red';}
}
async function cuUpdate(id,role){ try{ await cuApi('update',{id,role}); }catch(e){alert(e.message);loadCompanyUsers(CU_COMPANY);} }
async function cuToggle(id){ try{ await cuApi('toggle',{id}); loadCompanyUsers(CU_COMPANY);}catch(e){alert(e.message);} }
async function cuReset(id,nome){ if(!confirm('Resetar a senha de '+nome+'?'))return; try{ const d=await cuApi('reset_password',{id}); prompt('Nova senha temporária de '+nome+':',d.temp_password);}catch(e){alert(e.message);} }

/* auto-login dentro do painel unificado (chave compartilhada via sessionStorage) */
(function(){try{
  if(window.self===window.top){location.replace('/painel.html#overview');return;}
  var h=document.querySelector("header");if(h)h.style.display="none";
  var k=localStorage.getItem('ee_admin_key')||sessionStorage.getItem('ee_admin_key');
  if(k){KEY=k;load();}
}catch(e){}})();

async function grantInDrawer(id){
  const amount=parseInt($('dvAmt').value,10), reason=($('dvReason').value||'').trim(), msg=$('dvMsg');
  if(!amount){msg.textContent='Informe uma quantidade (≠ 0)';msg.className='small red';return;}
  msg.textContent='Processando…';msg.className='small muted';
  try{
    const r=await fetch('/api/b2b?fn=admin_grant_credits',{method:'POST',
      headers:{'Content-Type':'application/json','X-Api-Key':KEY},
      body:JSON.stringify({company_id:id,amount,reason})});
    const d=await r.json(); if(!r.ok)throw new Error(d.error||'Falha');
    msg.textContent=`✓ ${d.delta>0?'+':''}${d.delta} → saldo ${d.saldo}`;msg.className='small green';
    setTimeout(()=>empresa360(id),700);
  }catch(e){msg.textContent=e.message;msg.className='small red';}
}
</script>
</body>
</html>
