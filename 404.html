  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080F; --bg-card: #0F0F1E;
      --accent: #6C63FF; --accent-dim: rgba(108,99,255,0.12);

    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; }
    .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; }
    .grad { background: linear-gradient(135deg, #A89BFF 0%, #6C63FF 50%, #C9A84C 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .serif { font-family: 'Playfair Display', Georgia, serif; }
    .num { font-size: clamp(5rem, 15vw, 9rem); font-weight: 700; letter-spacing: -0.05em; line-height: 1; margin-bottom: 24px; }
    h1 { font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 700; margin-bottom: 16px; }
    p { color: var(--text-2); font-size: 1rem; max-width: 420px; line-height: 1.7; margin-bottom: 40px; }
    .links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .btn-primary { background: var(--accent); color: var(--white); padding: 14px 28px; border-radius: 10px; font-size: 0.95rem; font-weight: 700; text-decoration: none; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost { border: 1px solid var(--border-hover); color: var(--text-2); padding: 14px 24px; border-radius: 10px; font-size: 0.9rem; text-decoration: none; transition: border-color 0.2s, color 0.2s; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
    nav { position: fixed; top: 0; left: 0; right: 0; padding: 16px 24px; display: flex; align-items: center; }
    .nav-logo { font-size: 1.1rem; font-weight: 700; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
  </style>
