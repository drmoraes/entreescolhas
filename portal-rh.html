<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portal RH — Banco de Talentos | Entre Escolhas</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="/favicon.svg" />
<style>
  :root{
    --bg:#08080F; --bg-card:#0F0F1E; --bg-raised:#141428;
    --border:rgba(108,99,255,.15); --border-hover:rgba(108,99,255,.4);
    --accent:#6C63FF; --accent-dim:rgba(108,99,255,.12);
    --text:#F0EFF8; --text-2:#9490C0; --text-3:#5E5A8A;
    --white:#fff; --green:#22C55E; --green-dim:rgba(34,197,94,.10);
    --gold:#C9A84C; --red:#EF4444; --red-dim:rgba(239,68,68,.10);
    --radius:14px; --shadow:0 10px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:600;transition:.15s}
  input,select,textarea{font-family:inherit;background:var(--bg-raised);border:1px solid var(--border);
    color:var(--text);border-radius:10px;padding:11px 13px;font-size:14px;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--border-hover)}
  .btn{background:var(--accent);color:#fff;padding:11px 18px;font-size:14px}
  .btn:hover{filter:brightness(1.1)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-ghost{background:var(--accent-dim);color:var(--accent)}
  .btn-soft{background:var(--bg-raised);color:var(--text-2);border:1px solid var(--border)}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg-raised);border:1px solid var(--border);
    border-radius:999px;padding:4px 10px;font-size:12px;color:var(--text-2)}
  .muted{color:var(--text-2)} .small{font-size:12px} .hide{display:none!important}
  /* ===== Auth ===== */
  #auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;
    padding:34px;max-width:420px;width:100%;box-shadow:var(--shadow)}
  .auth-card h1{font-size:22px;margin-bottom:4px}
  .auth-card p.sub{color:var(--text-2);font-size:14px;margin-bottom:22px}
  .field{margin-bottom:14px}.field label{display:block;font-size:12px;color:var(--text-2);margin-bottom:6px}
  .tabs{display:flex;gap:8px;margin-bottom:20px}
  .tabs button{flex:1;padding:9px;background:var(--bg-raised);color:var(--text-2);border:1px solid var(--border)}
  .tabs button.on{background:var(--accent-dim);color:var(--accent);border-color:var(--border-hover)}
  .err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
  /* ===== Shell ===== */
  header.bar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:16px;
    padding:12px 22px;background:color-mix(in srgb, var(--bg) 85%, transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .brand{font-weight:800;letter-spacing:-.3px}.brand span{color:var(--accent)}
  .bar .spacer{flex:1}
  .balance{display:flex;align-items:center;gap:8px;background:var(--accent-dim);border:1px solid var(--border-hover);
    border-radius:999px;padding:7px 14px;font-weight:700;color:#fff;cursor:pointer}
  .balance b{color:var(--accent)}
  .layout{display:grid;grid-template-columns:288px 1fr;gap:0;min-height:calc(100vh - 57px)}
  aside{border-right:1px solid var(--border);padding:20px;background:var(--bg-card)}
  aside h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin:18px 0 10px}
  aside h3:first-child{margin-top:0}
  main{padding:24px 28px;max-width:1100px}
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .toolbar h2{font-size:19px}.count{color:var(--text-2);font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  /* ===== Card ===== */
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px;display:flex;flex-direction:column;gap:10px;transition:.15s}
  .card:hover{border-color:var(--border-hover);transform:translateY(-2px)}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .alias{font-weight:700;font-size:15px}.role{color:var(--text-2);font-size:13px}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .badge.active{background:var(--green-dim);color:var(--green)}
  .badge.warm{background:rgba(201,168,76,.12);color:var(--gold)}
  .badge.cold{background:var(--red-dim);color:var(--red)}
  .scores{display:flex;flex-direction:column;gap:7px}
  .score-row{display:flex;align-items:center;gap:9px;font-size:12px}
  .score-row .lbl{width:78px;color:var(--text-2)}
  .bar{flex:1;height:7px;background:var(--bg-raised);border-radius:5px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:5px}
  .bar.adh i{background:linear-gradient(90deg,#6C63FF,#9F97FF)}
  .bar.conf i{background:linear-gradient(90deg,#C9A84C,#E6CF86)}
  .score-row .val{width:30px;text-align:right;font-weight:700}
  .skills{display:flex;flex-wrap:wrap;gap:5px}
  .skills .chip{padding:2px 8px;font-size:11px}
  .card .meta{display:flex;flex-wrap:wrap;gap:8px;color:var(--text-3);font-size:12px}
  .card .actions{display:flex;gap:8px;margin-top:auto}
  .card .actions .btn{flex:1;padding:9px;font-size:13px}
  /* ===== Modal ===== */
  .modal-bg{position:fixed;inset:0;background:rgba(4,4,10,.72);backdrop-filter:blur(4px);
    display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto}
  .modal{background:var(--bg-card);border:1px solid var(--border-hover);border-radius:18px;
    width:100%;max-width:560px;box-shadow:var(--shadow)}
  .modal .head{padding:20px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
  .modal .body{padding:22px}
  .modal .foot{padding:18px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
  .x{background:none;color:var(--text-2);font-size:22px;line-height:1;padding:0 4px}
  .breakdown{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .bd-row{display:flex;align-items:center;gap:10px;font-size:13px}
  .bd-row .bdl{flex:1;color:var(--text-2)}.bd-row .bdp{font-weight:700}
  .bd-bar{width:90px;height:6px;background:var(--bg-raised);border-radius:4px;overflow:hidden}
  .bd-bar i{display:block;height:100%;background:var(--accent)}
  .guarantee{display:flex;gap:10px;align-items:flex-start;background:var(--green-dim);
    border:1px solid rgba(34,197,94,.25);border-radius:12px;padding:12px 14px;margin-top:14px;font-size:13px}
  .guarantee b{color:var(--green)}
  .reveal{background:var(--bg-raised);border:1px solid var(--border-hover);border-radius:12px;padding:16px;margin-top:8px}
  .reveal .r{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
  .reveal .r:last-child{border:none}.reveal .r .k{color:var(--text-2)}
  /* ===== Wallet drawer ===== */
  .drawer-bg{position:fixed;inset:0;background:rgba(4,4,10,.6);z-index:60;display:flex;justify-content:flex-end}
  .drawer{width:440px;max-width:92vw;background:var(--bg-card);border-left:1px solid var(--border-hover);
    height:100%;overflow:auto;padding:24px}
  .pkg{display:flex;gap:10px;margin:14px 0}
  .pkg button{flex:1;background:var(--bg-raised);border:1px solid var(--border);color:var(--text);padding:14px 8px;text-align:center}
  .pkg button:hover{border-color:var(--border-hover)}
  .pkg b{display:block;font-size:18px;color:var(--accent)}
  .led{font-size:13px;border-bottom:1px solid var(--border);padding:9px 0;display:flex;justify-content:space-between}
  .led .pos{color:var(--green)}.led .neg{color:var(--red)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg-raised);
    border:1px solid var(--border-hover);border-radius:12px;padding:13px 20px;z-index:90;box-shadow:var(--shadow);
    font-size:14px;opacity:0;transition:.25s;pointer-events:none;max-width:90vw}
  .toast.show{opacity:1}
  .empty{text-align:center;padding:60px 20px;color:var(--text-2)}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--accent-dim);
    border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  @media(max-width:820px){.layout{grid-template-columns:1fr}aside{display:none}}
</style>
  <link rel="stylesheet" href="/theme.css?v=3">
  <script src="/theme.js?v=3"></script>
  <script src="/cookies.js?v=1" defer></script>
</head>
<body>

<!-- ================= AUTH ================= -->
<div id="auth">
  <div class="auth-card">
    <div class="brand" style="font-size:20px;margin-bottom:18px">Entre<span>Escolhas</span> · Portal RH</div>
    <div class="tabs">
      <button id="tabLogin" class="on" onclick="setMode('login')">Entrar</button>
      <button id="tabReg" onclick="setMode('register')">Criar conta</button>
    </div>
    <h1 id="authTitle">Bem-vindo de volta</h1>
    <p class="sub" id="authSub">Acesse o banco de talentos e encontre quem responde.</p>
    <div id="regFields" class="hide">
      <div class="field"><label>Empresa</label><input id="rCompany" placeholder="Nome da empresa" /></div>
      <div class="field"><label>Seu nome</label><input id="rName" placeholder="Como te chamamos" /></div>
    </div>
    <div class="field"><label>E-mail corporativo</label><input id="aEmail" type="email" placeholder="voce@empresa.com" /></div>
    <div class="field"><label>Senha</label><input id="aPass" type="password" placeholder="••••••••" /></div>
    <button class="btn" style="width:100%" id="authBtn" onclick="doAuth()">Entrar</button>
    <div class="err" id="authErr"></div>
    <p class="small muted" style="margin-top:14px"><a href="/" style="color:var(--text-2);text-decoration:underline">← Voltar para o início</a></p>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hide">
  <header class="bar">
    <div class="brand">Entre<span>Escolhas</span> · RH</div>
    <div class="spacer"></div>
    <div class="balance" onclick="openWallet()"><span>💳</span> <b id="balNum">0</b>&nbsp;créditos</div>
    <button class="btn-soft" style="padding:8px 12px" onclick="logout()">Sair</button>
  </header>

  <div class="layout">
    <aside>
      <h3>Busca</h3>
      <div class="field"><label>Palavra-chave (cargo)</label><input id="fCargo" placeholder="ex: desenvolvedor" oninput="debouncedSearch()" /></div>
      <div class="field"><label>Skills (separe por vírgula)</label><input id="fSkills" placeholder="React, Node, AWS" oninput="debouncedSearch()" /></div>
      <h3>Filtros</h3>
      <div class="field"><label>Área</label><select id="fArea" onchange="search()"><option value="">Todas</option>
        <option>Tecnologia</option><option>Dados</option><option>Produto</option><option>Design</option><option>Marketing</option><option>Vendas</option></select></div>
      <div class="field"><label>Senioridade</label><select id="fSen" onchange="search()"><option value="">Qualquer</option>
        <option value="junior">Júnior</option><option value="pleno">Pleno</option><option value="senior">Sênior</option><option value="especialista">Especialista</option></select></div>
      <div class="field"><label>Categoria do cargo</label><select id="fCat" onchange="search()"><option value="">Qualquer</option>
        <option value="operacional">Operacional</option><option value="analista">Analista</option><option value="especialista">Especialista</option><option value="gerencial">Gerencial</option></select></div>
      <div class="field"><label>PCD (inclusão / cota)</label><select id="fPcd" onchange="search()"><option value="">Indiferente</option>
        <option value="true">Somente PCD</option><option value="false">Sem PCD</option></select></div>
      <div class="field"><label>Setor de experiência</label><input id="fSetor" placeholder="ex: varejo, farmácia, mercado" oninput="debouncedSearch()" /></div>
      <div class="field"><label>Modelo</label><select id="fModel" onchange="search()"><option value="">Qualquer</option>
        <option value="remoto">Remoto</option><option value="hibrido">Híbrido</option><option value="presencial">Presencial</option></select></div>
      <div class="field"><label>Cidade/Região</label><input id="fCidade" placeholder="ex: São Paulo" oninput="debouncedSearch()" /></div>
      <div class="field"><label>CEP da vaga (perto de casa)</label><input id="fCep" placeholder="ex: 01310-100" oninput="debouncedSearch()" /><span id="cepInfo" class="small muted"></span></div>
      <div class="field"><label>Budget máx. (R$)</label><input id="fSalary" type="number" placeholder="8000" oninput="debouncedSearch()" /></div>
      <div class="field"><label>Confiança mínima</label><select id="fConf" onchange="search()"><option value="0">Qualquer</option>
        <option value="50">≥ 50</option><option value="70">≥ 70</option><option value="85">≥ 85</option></select></div>
      <label class="chip" style="cursor:pointer;margin-top:6px"><input type="checkbox" id="fCold" style="width:auto" onchange="search()" /> incluir perfis frios</label>
    </aside>

    <main>
      <div class="toolbar">
        <h2>Candidatos</h2>
        <span class="count" id="resCount"></span>
        <div class="spacer" style="flex:1"></div>
      </div>
      <div id="results" class="grid"></div>
      <div id="resState"></div>
    </main>
  </div>
</div>

<div id="modalRoot"></div>
<div id="walletRoot"></div>
<div class="toast" id="toast"></div>

<script>
const API = '/api';
let SESSION = localStorage.getItem('rh_session') || '';
let BALANCE = 0;
let MODE = 'login';
let lastCriteria = {};

const $ = (id) => document.getElementById(id);
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3200);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function api(path, {method='GET', body, auth=true}={}){
  const headers={'Content-Type':'application/json'};
  if(auth && SESSION) headers['Authorization']='Bearer '+SESSION;
  const r=await fetch(API+path,{method,headers,body:body?JSON.stringify(body):undefined});
  const data=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.error||('Erro '+r.status));
  return data;
}

/* ===== Auth ===== */
function setMode(m){MODE=m;
  $('tabLogin').classList.toggle('on',m==='login');$('tabReg').classList.toggle('on',m==='register');
  $('regFields').classList.toggle('hide',m!=='register');
  $('authTitle').textContent=m==='login'?'Bem-vindo de volta':'Crie sua conta';
  $('authSub').textContent=m==='login'?'Acesse o banco de talentos e encontre quem responde.':'5 créditos de boas-vindas para você testar sem medo.';
  $('authBtn').textContent=m==='login'?'Entrar':'Criar conta e ganhar 5 créditos';
  $('authErr').textContent='';
}
async function doAuth(){
  $('authErr').textContent='';
  const email=$('aEmail').value.trim(), password=$('aPass').value;
  try{
    let res;
    if(MODE==='register'){
      res=await api('/b2b?fn=login&action=register',{method:'POST',auth:false,
        body:{email,password,company:$('rCompany').value.trim(),nome:$('rName').value.trim()}});
    }else{
      res=await api('/b2b?fn=login',{method:'POST',auth:false,body:{email,password}});
    }
    SESSION=res.session;localStorage.setItem('rh_session',SESSION);
    BALANCE=res.balance;
    enterApp(res.welcome);
  }catch(e){$('authErr').textContent=e.message;}
}
function logout(){localStorage.removeItem('rh_session');SESSION='';location.reload();}

function enterApp(welcome){
  $('auth').classList.add('hide');$('app').classList.remove('hide');
  updateBalance(BALANCE);
  if(welcome) toast('Conta criada! 5 créditos de boas-vindas adicionados 🎉');
  // retorno do checkout do Mercado Pago
  const pay=new URLSearchParams(location.search).get('pay');
  if(pay){
    history.replaceState(null,'',location.pathname);
    if(pay==='success'){ toast('✓ Pagamento aprovado! Os créditos aparecem em instantes.'); setTimeout(refreshBalance,2500); }
    else if(pay==='pending') toast('Pagamento em análise. Avisaremos quando aprovar.');
    else toast('Pagamento não concluído.');
  }
  search();
}
async function refreshBalance(){ try{ const w=await api('/b2b?fn=wallet'); updateBalance(w.balance); }catch(e){} }
function updateBalance(n){BALANCE=n;$('balNum').textContent=n;}

/* ===== Search ===== */
let _t;
function debouncedSearch(){clearTimeout(_t);_t=setTimeout(search,350);}
let jobCoords=null, lastCep='';
async function geocodeJobCep(){
  const cep=($('fCep').value||'').replace(/\D/g,'');
  if(cep.length!==8){jobCoords=null;lastCep='';$('cepInfo').textContent='';return;}
  if(cep===lastCep)return;
  lastCep=cep;jobCoords=null;$('cepInfo').textContent='localizando…';
  try{
    const r=await fetch('https://brasilapi.com.br/api/cep/v2/'+cep);
    if(r.ok){const j=await r.json();const co=j.location&&j.location.coordinates;
      if(co&&co.latitude){jobCoords={lat:co.latitude,lon:co.longitude};$('cepInfo').textContent='📍 '+(j.city||'')+' '+(j.state||'');}
      else $('cepInfo').textContent=('📍 '+(j.city||'')+' '+(j.state||'')+' (aprox.)').trim();}
    else $('cepInfo').textContent='';
  }catch(e){$('cepInfo').textContent='';}
}
function buildQuery(){
  const p=new URLSearchParams();
  const map={cargo:'fCargo',skills:'fSkills',area:'fArea',senioridade:'fSen',categoria:'fCat',pcd:'fPcd',setor:'fSetor',work_model:'fModel',cidade:'fCidade',salary_max:'fSalary',min_confidence:'fConf'};
  for(const[k,id]of Object.entries(map)){const el=$(id);const v=(el&&el.value||'').trim();if(v&&v!=='0')p.set(k,v);}
  if($('fCold').checked)p.set('include_cold','true');
  const cepRaw=($('fCep').value||'').replace(/\D/g,'');
  if(cepRaw.length===8)p.set('job_cep',cepRaw); // servidor geocodifica (com fallback) se preciso
  if(jobCoords){p.set('job_lat',jobCoords.lat);p.set('job_lon',jobCoords.lon);}
  return p;
}
async function search(){
  await geocodeJobCep();
  const p=buildQuery();
  $('resState').innerHTML='<div class="empty"><span class="spin"></span></div>';
  $('results').innerHTML='';
  try{
    const res=await api('/b2b?fn=search&'+p.toString());
    lastCriteria=res.criteria||{};
    $('resCount').textContent=res.total+' candidato(s) · ordenados por aderência';
    $('resState').innerHTML='';
    if(!res.data.length){$('resState').innerHTML='<div class="empty">Nenhum candidato com esses filtros.<br>Tente afrouxar critérios ou marcar “incluir perfis frios”.</div>';return;}
    $('results').innerHTML=res.data.map(cardHTML).join('');
  }catch(e){
    if(/auten|sess/i.test(e.message)){logout();return;}
    $('resState').innerHTML='<div class="empty">'+esc(e.message)+'</div>';
  }
}
function thermalBadge(c){
  if(c.thermal==='ativo')return '<span class="badge active">● Ativo</span>';
  if(c.thermal==='morno')return '<span class="badge warm">● Morno</span>';
  return '<span class="badge cold">● Frio</span>';
}
function custoLabel(c){
  const n=(c.credit_cost!=null)?c.credit_cost:1;
  return n+' créd.';
}
function pcdBadge(c){
  return c.pcd?'<span class="badge" style="background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.3)">♿ PCD</span>':'';
}
function catChip(c){
  const m={operacional:'Operacional',analista:'Analista',especialista:'Especialista',gerencial:'Gerencial',pcd:'PCD'};
  const k=c.categoria_efetiva||c.categoria; if(!k||!m[k])return '';
  return '<span class="chip" style="background:var(--accent-dim);color:#cfcaff">'+m[k]+'</span>';
}
function cardHTML(c){
  const skills=(c.skills||[]).slice(0,4).map(s=>`<span class="chip">${esc(s)}</span>`).join('');
  const setores=(c.setores||[]).slice(0,3).map(s=>`<span class="chip" style="background:rgba(201,168,76,.10);color:#e6cf8f">${esc(s)}</span>`).join('');
  return `<div class="card">
    <div class="top">
      <div><div class="alias">${esc(c.alias)}</div><div class="role">${esc(c.cargo||c.area||'—')} · ${esc(c.senioridade||'')}</div></div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">${thermalBadge(c)}${pcdBadge(c)}</div>
    </div>
    <div class="scores">
      <div class="score-row"><span class="lbl">Aderência</span><span class="bar adh"><i style="width:${c.adherence}%"></i></span><span class="val">${c.adherence}</span></div>
      <div class="score-row"><span class="lbl">Confiança</span><span class="bar conf"><i style="width:${c.confidence}%"></i></span><span class="val">${c.confidence}</span></div>
    </div>
    <div class="skills">${catChip(c)}${skills}${setores}</div>
    <div class="meta"><span>📍 ${esc(c.regiao||'—')}</span>${c.proximidade?'<span style="color:var(--green)">🏠 '+esc(c.proximidade)+'</span>':''}<span>💼 ${esc(c.work_model||'—')}</span><span>⏱ ${esc(c.availability||'—')}</span>${c.salary_band?'<span>💰 '+esc(c.salary_band)+'</span>':''}<span>💳 ${custoLabel(c)}</span></div>
    <div class="actions">
      <button class="btn-ghost" style="flex:1;padding:9px" onclick="openCandidate('${c.token}')">Ver perfil</button>
      ${c.unlocked
        ? '<button class="btn-soft" style="flex:1;padding:9px" onclick="openCandidate(\''+c.token+'\')">✓ Desbloqueado</button>'
        : '<button class="btn" onclick="openCandidate(\''+c.token+'\')">Desbloquear · '+custoLabel(c)+'</button>'}
    </div>
  </div>`;
}

/* ===== Candidate modal ===== */
async function openCandidate(token){
  const root=$('modalRoot');
  root.innerHTML='<div class="modal-bg"><div class="modal"><div class="body"><div class="empty"><span class="spin"></span></div></div></div></div>';
  const p=buildQuery();
  let c;
  try{ c=await api('/b2b?fn=candidate&token='+encodeURIComponent(token)+'&'+p.toString()); }
  catch(e){ closeModal(); toast(e.message); return; }
  renderCandidate(c);
}
function bdRows(reasons,maxField,labelField){
  return reasons.map(r=>{
    const pct=Math.round((r.pontos/r[maxField])*100);
    return `<div class="bd-row"><span class="bdl">${esc(r[labelField])} <span class="muted small">(${esc(r.detalhe)})</span></span>
      <span class="bd-bar"><i style="width:${pct}%"></i></span><span class="bdp">${r.pontos}/${r[maxField]}</span></div>`;
  }).join('');
}
function renderCandidate(c){
  const root=$('modalRoot');
  let revealHTML='';
  if(c.unlocked && c.revealed){
    const r=c.revealed;
    const sla=c.unlock&&c.unlock.sla_deadline?new Date(c.unlock.sla_deadline):null;
    const slaTxt=c.unlock&&c.unlock.status==='responded'?'<span style="color:var(--green)">✓ Respondeu</span>'
      :c.unlock&&c.unlock.status==='refunded'?'<span style="color:var(--gold)">↩ Estornado</span>'
      :sla?('SLA até '+sla.toLocaleDateString('pt-BR')):'Convite não enviado';
    revealHTML=`<div class="reveal">
      <div class="r"><span class="k">Nome</span><b>${esc(r.nome)}</b></div>
      <div class="r"><span class="k">E-mail</span><b>${esc(r.email)}</b></div>
      <div class="r"><span class="k">Telefone</span><b>${esc(r.telefone||'—')}</b></div>
      <div class="r"><span class="k">Cidade</span><b>${esc(r.cidade||'—')}</b></div>
      <div class="r"><span class="k">Empresa atual</span><b>${esc(r.empresa||'—')}</b></div>
      <div class="r"><span class="k">LinkedIn</span><b>${esc(r.linkedin||'—')}</b></div>
      <div class="r"><span class="k">Status do convite</span><b>${slaTxt}</b></div>
    </div>`;
  }
  const wa = c.revealed ? waLink(c.revealed.telefone, c.revealed.nome) : null;
  const foot = c.unlocked
    ? `<button class="btn-soft" onclick="openDispute('${c.token}')">Reportar problema</button>
       ${wa?'<a class="btn-soft" style="text-decoration:none;display:inline-block" href="'+wa+'" target="_blank" rel="noopener">WhatsApp</a>':''}
       ${c.unlock&&c.unlock.invited_at?'':'<button class="btn" onclick="sendInvite(\''+c.token+'\')">Enviar convite por e-mail</button>'}`
    : `<button class="btn-soft" onclick="closeModal()">Fechar</button>
       <button class="btn" id="unlockBtn" data-cost="${c.credit_cost!=null?c.credit_cost:1}" onclick="doUnlock('${c.token}')">Desbloquear · ${c.credit_cost!=null?c.credit_cost:1} crédito(s)</button>`;
  root.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="head">
      <div><div class="alias" style="font-size:18px">${esc(c.alias)}</div>
        <div class="role">${esc(c.cargo||'')} · ${esc(c.senioridade||'')} · ${esc(c.regiao||'')}</div></div>
      <button class="x" onclick="closeModal()">×</button>
    </div>
    <div class="body">
      <div style="display:flex;gap:18px;margin-bottom:8px">
        <div><div class="muted small">Aderência à vaga</div><div style="font-size:30px;font-weight:800;color:var(--accent)">${c.adherence}</div></div>
        <div><div class="muted small">Confiança/resposta</div><div style="font-size:30px;font-weight:800;color:var(--gold)">${c.confidence}</div></div>
        <div style="flex:1;display:flex;align-items:flex-end;justify-content:flex-end">${thermalBadge(c)}</div>
      </div>
      <div class="skills" style="margin:10px 0">${(c.skills||[]).map(s=>'<span class="chip">'+esc(s)+'</span>').join('')}</div>
      <h3 style="font-size:13px;color:var(--text-3);text-transform:uppercase;margin:16px 0 4px">Por que esse fit (Aderência)</h3>
      <div class="breakdown">${bdRows(c.adherence_reasons,'max','criterio')}</div>
      <h3 style="font-size:13px;color:var(--text-3);text-transform:uppercase;margin:18px 0 4px">Confiança / responsividade</h3>
      <div class="breakdown">${bdRows(c.confidence_reasons,'max','fator')}</div>
      ${c.unlocked?revealHTML:`<div class="guarantee"><span>🛡️</span><div><b>Desbloqueio Protegido.</b> Se o contato for inválido ou o candidato não responder em 7 dias após o convite, seu crédito volta automaticamente.</div></div>`}
    </div>
    <div class="foot">${foot}</div>
  </div></div>`;
}
function closeModal(){$('modalRoot').innerHTML='';}

async function doUnlock(token){
  const btn=$('unlockBtn'); if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
  try{
    const res=await api('/b2b?fn=unlock',{method:'POST',body:{token,criteria:lastCriteria}});
    updateBalance(res.balance);
    if(res.refunded){ toast('⚠ '+res.message); closeModal(); search(); return; }
    toast('✓ Candidato desbloqueado!');
    openCandidate(token); search();
  }catch(e){ toast(e.message); if(btn){btn.disabled=false;btn.textContent='Desbloquear · '+(btn.dataset.cost||1)+' crédito(s)';}
    if(/insuficiente/i.test(e.message)) openWallet(); }
}
function waLink(tel,nome){
  const d=String(tel||'').replace(/\D/g,'');if(d.length<10)return null;
  const intl=d.startsWith('55')?d:'55'+d;
  return 'https://wa.me/'+intl+'?text='+encodeURIComponent('Olá, '+(nome||'')+'! Encontramos seu perfil no Banco de Talentos do Entre Escolhas e gostaríamos de conversar sobre uma oportunidade.');
}
async function sendInvite(token){
  try{ const res=await api('/b2b?fn=invite',{method:'POST',body:{token,message:'Olá! Vi seu perfil e gostaria de conversar sobre uma oportunidade.'}});
    toast(res.email_sent?'✓ Convite enviado por e-mail':'Convite registrado (e-mail indisponível — use o WhatsApp)');
    openCandidate(token); }
  catch(e){ toast(e.message); }
}
function openDispute(token){
  const root=$('modalRoot');
  root.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:440px">
    <div class="head"><b>Reportar problema</b><button class="x" onclick="closeModal()">×</button></div>
    <div class="body">
      <p class="muted small" style="margin-bottom:12px">Reembolso automático para candidato fora do mercado ou desatualizado (dentro de 7 dias).</p>
      <div class="field"><label>Motivo</label><select id="dReason">
        <option value="not_eligible">Saiu do mercado / aceitou outra vaga</option>
        <option value="outdated">Dados desatualizados</option>
        <option value="quality">Qualidade do perfil (análise manual)</option></select></div>
      <div class="field"><label>Observação (opcional)</label><textarea id="dNotes" rows="3"></textarea></div>
    </div>
    <div class="foot"><button class="btn-soft" onclick="closeModal()">Cancelar</button>
      <button class="btn" onclick="submitDispute('${token}')">Solicitar reembolso</button></div>
  </div></div>`;
}
async function submitDispute(token){
  try{ const res=await api('/b2b?fn=dispute',{method:'POST',body:{token,reason:$('dReason').value,notes:$('dNotes').value}});
    if(res.refunded){updateBalance(res.balance);} toast(res.message); closeModal(); search(); }
  catch(e){ toast(e.message); }
}

/* ===== Wallet ===== */
async function openWallet(){
  const root=$('walletRoot');
  root.innerHTML='<div class="drawer-bg" onclick="if(event.target===this)closeWallet()"><div class="drawer"><div class="empty"><span class="spin"></span></div></div></div>';
  try{
    const w=await api('/b2b?fn=wallet');
    updateBalance(w.balance);
    const pkgs=Object.entries(w.packages).map(([k,v])=>`<button onclick="buy('${k}')"><b>${v.credits}</b>créditos<br><span class="muted small">R$ ${v.price}</span></button>`).join('');
    const led=w.ledger.map(l=>{
      const cls=l.delta>0?'pos':'neg';const lab={purchase:'Compra',bonus:'Bônus',unlock:'Desbloqueio',refund_auto:'Estorno automático',refund_manual:'Reembolso',expire:'Expiração'}[l.reason]||l.reason;
      return `<div class="led"><span>${lab}<br><span class="muted small">${new Date(l.created_at).toLocaleString('pt-BR')}</span></span><b class="${cls}">${l.delta>0?'+':''}${l.delta}</b></div>`;
    }).join('');
    const st=w.stats;
    root.querySelector('.drawer').innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <h2 style="font-size:18px">Carteira</h2><button class="x" onclick="closeWallet()">×</button></div>
      <div style="font-size:40px;font-weight:800;color:var(--accent)">${w.balance}<span style="font-size:15px;color:var(--text-2)"> créditos</span></div>
      <div style="display:flex;gap:14px;margin:14px 0;flex-wrap:wrap">
        <span class="chip">${st.total} desbloqueios</span>
        <span class="chip" style="color:var(--green)">${st.respondidos} responderam</span>
        <span class="chip" style="color:var(--gold)">${st.estornados} estornados</span>
        <span class="chip">${st.aguardando} aguardando</span></div>
      <h3 style="font-size:12px;text-transform:uppercase;color:var(--text-3);margin-top:18px">Comprar créditos</h3>
      <input id="couponInput" placeholder="Cupom (opcional)" style="text-transform:uppercase;margin-bottom:10px;width:100%;background:var(--bg-raised,#141428);border:1px solid var(--border,rgba(108,99,255,.15));color:inherit;border-radius:10px;padding:9px 12px;font:inherit">
      <div class="pkg">${pkgs}</div>
      <h3 style="font-size:12px;text-transform:uppercase;color:var(--text-3);margin-top:18px">Extrato</h3>
      ${led||'<p class="muted small">Sem movimentações ainda.</p>'}`;
  }catch(e){ toast(e.message); closeWallet(); }
}
function closeWallet(){$('walletRoot').innerHTML='';}
async function buy(pkg){
  const ci=$('couponInput'); const coupon=ci?ci.value.trim():'';
  try{ const res=await api('/b2b?fn=wallet',{method:'POST',body:{package:pkg,coupon:coupon||undefined}});
    if(res.pending && res.init_point){ toast(res.discount?('Cupom aplicado! Desconto R$ '+Number(res.discount).toFixed(2)):'Redirecionando ao checkout…'); location.href=res.init_point; return; }
    if(res.pending){ toast('Pagamento em processamento…'); return; }
    updateBalance(res.balance); toast('✓ +'+res.credited+' créditos'+(res.discount?(' (desconto R$ '+Number(res.discount).toFixed(2)+')'):'')); openWallet(); }
  catch(e){ toast(e.message); }
}

/* ===== Boot ===== */
if(SESSION){ api('/b2b?fn=wallet').then(w=>{BALANCE=w.balance;enterApp(false);}).catch(()=>{localStorage.removeItem('rh_session');SESSION='';}); }
</script>
</body>
</html>
