      <text x="96" y="410" font-family="DejaVu Serif" font-size="90" font-weight="bold" fill="#F5F2EA">Ficar num trabalho</text><text x="96" y="516" font-family="DejaVu Serif" font-size="90" font-weight="bold" fill="#F5F2EA">que te drena</text><text x="96" y="622" font-family="DejaVu Serif" font-size="90" font-weight="bold" fill="#D2A64B">também é</text><text x="96" y="728" font-family="DejaVu Serif" font-size="90" font-weight="bold" fill="#D2A64B">uma decisão.</text>
      <text x="96" y="1128" font-family="DejaVu Sans" font-size="34" fill="#8681A0">Só que não aparece como escolha —</text>
      <text x="96" y="1172" font-family="DejaVu Sans" font-size="34" fill="#8681A0">aparece como 'ainda não é hora'.</text>
