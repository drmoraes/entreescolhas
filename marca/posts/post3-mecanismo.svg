      <text x="96" y="400" font-family="DejaVu Serif" font-size="86" font-weight="bold" fill="#F5F2EA">O viés que</text><text x="96" y="501" font-family="DejaVu Serif" font-size="86" font-weight="bold" fill="#F5F2EA">sabota sua</text><text x="96" y="602" font-family="DejaVu Serif" font-size="86" font-weight="bold" fill="#F5F2EA">carreira se disfarça</text><text x="96" y="703" font-family="DejaVu Serif" font-size="86" font-weight="bold" fill="#8B82FF">de prudência.</text>
      <text x="96" y="1128" font-family="DejaVu Sans" font-size="34" fill="#8681A0">Chama-se viés do status quo.</text>
      <text x="96" y="1172" font-family="DejaVu Sans" font-size="34" fill="#8681A0">E ele é previsível — logo, treinável.</text>
