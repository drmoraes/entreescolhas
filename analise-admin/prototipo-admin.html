/* ---------- helpers de "gráfico" inline (sem libs) ---------- */
function sparkline(data,color){
  const w=78,h=26,max=Math.max(...data),min=Math.min(...data),rng=(max-min)||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1)*w).toFixed(1)},${(h-((v-min)/rng)*h).toFixed(1)}`).join(' ');
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function bars(data,labels){
  const max=Math.max(...data)||1;
  const bs=data.map(v=>`<div class="b" style="height:${Math.max(4,v/max*100)}%"><span>${fmtMoneyShort(v)}</span></div>`).join('');
  const xs=labels.map(l=>`<div>${l}</div>`).join('');
  return `<div class="bars">${bs}</div><div class="bars-x">${xs}</div>`;
}
function fmtMoney(n){return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtMoneyShort(n){return n>=1000?'R$'+(n/1000).toFixed(1)+'k':'R$'+n;}
function kpi(o){
  const d=o.delta!=null?`<div class="d ${o.delta>=0?'up':'down'}">${o.delta>=0?'▲':'▼'} ${Math.abs(o.delta)}% <span class="t3">vs período ant.</span></div>`:'';
  const sp=o.spark?sparkline(o.spark,o.sparkColor||'#6C63FF'):'';
  return `<div class="kpi"><div class="l">${o.l}</div><div class="v ${o.cls||''}">${o.v}</div>${d}${sp}</div>`;
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- drawer: empresa 360 ---------- */
function empresa360(id){
  const e=EMPRESAS.find(x=>x.id===id);
  const alerta = e.risco==='alto'
    ? `<div class="alert r"><span class="ic">⚠️</span><div><b>Crédito parado.</b> Comprou ${e.comprados}, gastou ${e.gastos}. ${e.ult_busca==='—'?'Nunca fez uma busca.':'Última busca há '+e.ult_busca+'.'} Forte sinal de churn — agendar contato de CS e oferecer onboarding.</div></div>`
    : e.estorno>15
    ? `<div class="alert gold"><span class="ic">⏳</span><div><b>Estorno alto (${e.estorno}%).</b> Provável base desatualizada na área de interesse. Priorizar reconfirmação dos frios.</div></div>`
    : `<div class="alert b"><span class="ic">✅</span><div>Conta saudável: usa créditos e tem boa taxa de resposta.</div></div>`;
  document.getElementById('drawerBody').innerHTML=`
    <h3>${esc(e.nome)} ${planTag(e.plan)}</h3>
    <div class="t3 small" style="margin-bottom:14px">${esc(e.email)} · empresa #${e.id}</div>
    ${alerta}
    <div class="grid kpis" style="grid-template-columns:1fr 1fr;gap:10px;margin-top:6px">
      ${kpi({l:'Saldo de créditos',v:e.saldo,cls:e.saldo<5?'red':'accent'})}
      ${kpi({l:'Receita total',v:fmtMoney(e.receita),cls:'green'})}
      ${kpi({l:'Comprados / gastos',v:e.comprados+' / '+e.gastos})}
      ${kpi({l:'Taxa de resposta',v:e.resp+'%'})}
    </div>
    <h2 class="sec">Conceder créditos / cortesia</h2>
    <div class="card">
      <div class="split">
        <input type="number" value="5" style="width:90px"><input placeholder="Motivo (ex.: cortesia, ativação)" style="flex:1;min-width:140px"><button class="btn">Conceder</button>
      </div>
      <div class="note">Use número negativo para debitar. Tudo fica auditável no <code>credit_ledger</code> com o ator (você).</div>
    </div>
    <h2 class="sec">Histórico de compras</h2>
    <table><thead><tr><th>Data</th><th>Pacote</th><th>Valor</th><th>Status</th></tr></thead><tbody>
      <tr><td>02/06</td><td>p${e.comprados<=10?'10':e.comprados<=25?'25':'50'}</td><td>${fmtMoney(e.receita)}</td><td><span class="tag g">pago</span></td></tr>
    </tbody></table>
    <h2 class="sec">Ações</h2>
    <div class="split">
      <button class="btn-soft">Simular busca como esta empresa</button>
      <button class="btn-ghost">Enviar e-mail de ativação</button>
      <button class="btn-danger">Suspender conta</button>
    </div>`;
  openDrawer();
}
function candidato(id){
  const c=CANDIDATOS.find(x=>x.id===id);
  document.getElementById('drawerBody').innerHTML=`
    <h3>${esc(c.cargo)}</h3>
    <div class="t3 small" style="margin-bottom:14px">${esc(c.area)} · candidato #${c.id}</div>
    <div class="grid" style="grid-template-columns:1fr 1fr;gap:12px">
      <div><label class="small muted">Cargo</label><input value="${esc(c.cargo)}"></div>
      <div><label class="small muted">Área</label><input value="${esc(c.area)}"></div>
      <div><label class="small muted">Senioridade</label><input value="${c.sen}"></div>
      <div><label class="small muted">Cidade</label><input value="${c.cidade}"></div>
    </div>
    <h2 class="sec">Status & consentimento</h2>
    <div class="card">
      <div class="split"><label class="split small"><input type="checkbox" class="chk" ${c.consent?'checked':''}> Consentimento B2B</label>
      <label class="split small"><input type="checkbox" class="chk" ${c.email?'checked':''}> E-mail verificado</label>
      <label class="split small"><input type="checkbox" class="chk" ${c.phone?'checked':''}> Telefone verificado</label></div>
    </div>
    <h2 class="sec">Ações</h2>
    <div class="split">
      <button class="btn">Salvar</button>
      <button class="btn-ghost">Reenviar reconfirmação</button>
      <button class="btn-danger">Arquivar (soft-delete)</button>
    </div>
    <div class="note">PII real só aparece com justificativa registrada na auditoria.</div>`;
  openDrawer();
}
function openDrawer(){document.getElementById('scrim').classList.add('on');document.getElementById('drawer').classList.add('on');}
function closeDrawer(){document.getElementById('scrim').classList.remove('on');document.getElementById('drawer').classList.remove('on');}

/* ---------- bulk select ---------- */
function toggleAll(box){document.querySelectorAll('.rowchk').forEach(c=>c.checked=box.checked);bulkCount();}
function bulkCount(){const n=document.querySelectorAll('.rowchk:checked').length;const bar=document.getElementById('bulkbar');if(bar){bar.style.display=n?'flex':'none';document.getElementById('bulkn').textContent=n;}}

/* ---------- router ---------- */
function go(t){
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  document.getElementById('app').innerHTML=V[t]();
  window.scrollTo(0,0);
}
document.getElementById('tabs').addEventListener('click',e=>{if(e.target.dataset.t)go(e.target.dataset.t);});
go('overview');
</script>
