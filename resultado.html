<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seu resultado — Entre Escolhas</title>
<link rel="icon" href="/favicon.svg" />
<style>
  :root{--bg:#08080F;--bg-card:#0F0F1E;--bg-raised:#141428;--border:rgba(108,99,255,.15);
    --accent:#6C63FF;--accent-dim:rgba(108,99,255,.12);--text:#F0EFF8;--text-2:#9490C0;--text-3:#5E5A8A;--green:#22C55E}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.55}
  .wrap{max-width:720px;margin:0 auto;padding:34px 22px 60px}
  .brand{font-weight:800;font-size:15px;margin-bottom:22px}.brand span{color:var(--accent)}
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:26px}
  h1{font-size:26px;letter-spacing:-.02em;margin:4px 0 2px}
  .jor{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3)}
  .mode{color:var(--accent);font-weight:700;margin-top:2px}
  .desc{color:var(--text-2);margin:12px 0 6px}
  h2.sec{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin:22px 0 10px}
  .dim{margin:10px 0}
  .dim .top{display:flex;justify-content:space-between;font-size:14px}
  .bar{height:10px;border-radius:6px;background:var(--bg-raised);overflow:hidden;margin-top:5px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#8b84ff)}
  .ins{background:var(--bg-raised);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
  .ins b{color:var(--text)}
  .btn{background:var(--accent);color:#fff;padding:12px 20px;font-size:14px;border:none;border-radius:11px;cursor:pointer;font-weight:700}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-2);padding:11px 18px;border-radius:11px;cursor:pointer;font-weight:600}
  .muted{color:var(--text-2)}.small{font-size:13px}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid var(--accent-dim);border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite;vertical-align:middle}
  @keyframes s{to{transform:rotate(360deg)}}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
  @media print{ body{background:#fff;color:#1b1b2a} .card{border:none} .noprint{display:none!important}
    .bar{background:#eee} .ins{background:#fafafa} .jor,.muted,h2.sec{color:#666} h1,.mode{color:#6C63FF} }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Entre<span>Escolhas</span></div>
  <div class="card" id="card">
    <div class="muted"><span class="spin"></span> Carregando seu resultado…</div>
  </div>
</div>
<script>
const JLABEL={arquetipo:'Arquétipo',bussola:'Bússola Vocacional','fit-cultural':'Fit Cultural',scanner:'Scanner de Relacionamento'};
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const access=new URLSearchParams(location.search).get('access');

async function init(){
  const card=document.getElementById('card');
  if(!access){card.innerHTML='<p class="muted">Link inválido. Use o link enviado no seu e-mail.</p>';return;}
  try{
    const r=await fetch('/api/lead_report?access='+encodeURIComponent(access));
    const d=await r.json();
    if(!r.ok){
      if(r.status===402){card.innerHTML=`<h1>Quase lá!</h1><p class="desc">Seu relatório completo ainda não foi desbloqueado. Verifique o e-mail com o link de pagamento, ou volte ao teste.</p><div class="row noprint"><a class="btn" href="/">Voltar ao site</a></div>`;return;}
      throw new Error(d.error||'Não foi possível carregar.');
    }
    render(d);
  }catch(e){card.innerHTML='<p class="muted">'+esc(e.message)+'</p>';}
}

function render(d){
  const rep=d.report||{}; const a=rep.arch||{}; const sc=rep.scores||{}; const dn=rep.dimNames||{};
  const dims=Object.keys(sc).map(k=>`<div class="dim"><div class="top"><span>${esc(dn[k]||k)}</span><b>${sc[k]}/100</b></div><div class="bar"><i style="width:${Math.max(2,Math.min(100,sc[k]))}%"></i></div></div>`).join('');
  const ins=(a.insights||[]).map(i=>`<div class="ins"><b>${esc(i.title||'')}</b><div class="muted small" style="margin-top:4px">${esc(i.text||'')}</div></div>`).join('');
  document.getElementById('card').innerHTML=`
    <div class="jor">${JLABEL[d.jornada]||d.jornada}</div>
    <h1>${esc(a.name||'Seu resultado')}</h1>
    ${a.mode?`<div class="mode">${esc(a.mode)}</div>`:''}
    ${a.desc?`<p class="desc">${esc(a.desc)}</p>`:''}
    ${dims?`<h2 class="sec">Suas dimensões</h2>${dims}`:''}
    ${ins?`<h2 class="sec">Insights</h2>${ins}`:''}
    <div class="row noprint">
      <button class="btn" onclick="window.print()">⬇︎ Baixar PDF</button>
      <a class="btn-ghost" href="/" style="text-decoration:none">Voltar ao site</a>
    </div>
    <p class="muted small noprint" style="margin-top:14px">Dica: no diálogo de impressão, escolha “Salvar como PDF”.</p>`;
}
init();
</script>
</body>
</html>
