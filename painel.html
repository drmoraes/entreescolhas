<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel Admin — Entre Escolhas</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="/favicon.svg" />
<style>
  :root{--bg:#08080F;--bg-card:#0F0F1E;--bg-raised:#141428;--border:rgba(108,99,255,.15);
    --accent:#6C63FF;--accent-dim:rgba(108,99,255,.12);--text:#F0EFF8;--text-2:#9490C0;--text-3:#5E5A8A;--red:#EF4444}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:600}
  input{font-family:inherit;background:var(--bg-raised);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 13px;font-size:14px;width:100%}
  .btn{background:var(--accent);color:#fff;padding:10px 16px;font-size:13px}
  .muted{color:var(--text-2)}.small{font-size:12px}.red{color:var(--red)}
  header{display:flex;align-items:center;gap:14px;padding:11px 22px;border-bottom:1px solid var(--border);background:color-mix(in srgb, var(--bg) 96%, transparent)}
  .brand{font-weight:800;font-size:15px}.brand span{color:var(--accent)}
  nav.tabs{display:flex;gap:2px;padding:0 14px;border-bottom:1px solid var(--border);background:var(--bg-card);overflow-x:auto}
  nav.tabs button{background:transparent;color:var(--text-2);padding:13px 16px;font-size:13px;border-bottom:2px solid transparent;border-radius:0;white-space:nowrap}
  nav.tabs button.on{color:var(--text);border-bottom-color:var(--accent)}
  nav.tabs button:hover{color:var(--text)}
  main{flex:1;position:relative;min-height:0}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg)}
  .gate{max-width:380px;margin:80px auto;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:30px}
  .logout{background:transparent;border:1px solid var(--border);color:var(--text-2);padding:7px 13px;font-size:12px}
</style>
  <link rel="stylesheet" href="/theme.css?v=2">
  <script src="/theme.js?v=2"></script>
  <script src="/cookies.js?v=1" defer></script>
</head>
<body>
<div id="gate" class="gate">
  <div class="brand" style="margin-bottom:10px">Entre<span>Escolhas</span> · Painel</div>
  <p class="muted small" style="margin-bottom:14px">Entre com a ADMIN_API_KEY (chave mestra) ou seu token de usuário.</p>
  <input id="key" type="password" placeholder="Chave / token" onkeydown="if(event.key==='Enter')entrar()" />
  <button class="btn" style="width:100%;margin-top:12px" onclick="entrar()">Entrar</button>
  <div id="gErr" class="red small" style="margin-top:10px"></div>
</div>

<div id="app" style="display:none;flex-direction:column;height:100%">
  <header>
    <div class="brand">Entre<span>Escolhas</span> · Painel</div>
    <div style="flex:1"></div>
    <span id="who" class="muted small"></span>
    <button class="logout" onclick="sair()">Sair</button>
  </header>
  <nav class="tabs" id="tabs">
    <button data-tab="overview" data-src="/admin-b2b.html" class="on">Visão geral</button>
    <button data-tab="candidatos" data-src="/admin-candidatos.html">Candidatos</button>
    <button data-tab="vagas" data-src="/admin-vagas.html">Vagas</button>
    <button data-tab="testes" data-src="/admin-testes.html">Testes</button>
    <button data-tab="cupons" data-src="/admin-cupons.html">Cupons</button>
    <button data-tab="afiliados" data-src="/admin-cashback.html">Afiliados</button>
    <button data-tab="usuarios" data-src="/admin-usuarios.html">Usuários</button>
  </nav>
  <main><iframe id="frame" title="seção"></iframe></main>
</div>

<script>
const $=id=>document.getElementById(id);
async function entrar(){
  const key=$('key').value.trim();
  if(!key){$('gErr').textContent='Informe a chave';return;}
  $('gErr').textContent='Verificando…';
  // valida a chave contra um endpoint admin antes de abrir o painel
  try{
    const r=await fetch('/api/b2b?fn=admin_users&op=audit',{headers:{'X-Api-Key':key}});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'Chave inválida');}
    // guarda no navegador (persiste entre sessões) — digita a senha UMA vez só
    localStorage.setItem('ee_admin_key',key);
    abrir();
  }catch(e){$('gErr').textContent=e.message;}
}
function abrir(){
  $('gate').style.display='none';$('app').style.display='flex';
  // abre a aba pedida no #hash (ex.: painel.html#candidatos), senão a primeira
  const tab=(location.hash||'').replace('#','');
  const btn=document.querySelector('#tabs button[data-tab="'+tab+'"]')||document.querySelector('#tabs button.on');
  go(btn);
}
function go(btn){
  if(!btn)return;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b===btn));
  if(btn.dataset.tab){ try{history.replaceState(null,'','#'+btn.dataset.tab);}catch(e){} }
  $('frame').src=btn.dataset.src;
}
$('tabs').addEventListener('click',e=>{if(e.target.dataset.src)go(e.target);});
function sair(){localStorage.removeItem('ee_admin_key');sessionStorage.removeItem('ee_admin_key');location.hash='';location.reload();}
// auto-entra se já houver chave salva (não pede senha de novo)
(function(){try{var k=localStorage.getItem('ee_admin_key')||sessionStorage.getItem('ee_admin_key');if(k){localStorage.setItem('ee_admin_key',k);abrir();}}catch(e){}})();
</script>
</body>
</html>
